name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Check out published tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "$RELEASE_TAG" = "v$VERSION"
      - name: Build package
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test wheel and packaged skill
        run: |
          python -m venv /tmp/kvault-release
          /tmp/kvault-release/bin/pip install dist/*.whl
          /tmp/kvault-release/bin/kvault --help
          SKILL_PATH=$(/tmp/kvault-release/bin/kvault skill path)
          test -f "$SKILL_PATH/SKILL.md"
          test -f "$SKILL_PATH/agents/openai.yaml"
          test -f "$SKILL_PATH/references/parallel-reconciliation.md"
          /tmp/kvault-release/bin/kvault init /tmp/kvault-release-kb --name "Release Smoke"
          /tmp/kvault-release/bin/kvault --kb-root /tmp/kvault-release-kb --json status
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
